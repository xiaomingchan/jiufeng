name: Sync Tencent Docs Data

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Export Tencent Docs
        id: export
        run: |
          # Step 1: Trigger export
          RESP=$(curl -s -X POST 'https://docs.qq.com/openapi/mcp' \
            -H "Authorization: ${{ secrets.TDOCS_AUTH }}" \
            -H "X-MCP-Request-Sign: ${{ secrets.TDOCS_SIGN }}" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -d '{"jsonrpc":"2.0","method":"tools/call","params":{"name":"manage.export_file","arguments":{"file_id":"${{ secrets.TDOCS_FILE_ID }}"}},"id":1}')
          TASK_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['structuredContent']['task_id'])")
          echo "Task ID: $TASK_ID"

          # Step 2: Poll for progress (max 30s)
          for i in $(seq 1 6); do
            sleep 5
            PROG=$(curl -s -X POST 'https://docs.qq.com/openapi/mcp' \
              -H "Authorization: ${{ secrets.TDOCS_AUTH }}" \
              -H "X-MCP-Request-Sign: ${{ secrets.TDOCS_SIGN }}" \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              -d "{\"jsonrpc\":\"2.0\",\"method\":\"tools/call\",\"params\":{\"name\":\"manage.export_progress\",\"arguments\":{\"task_id\":\"$TASK_ID\"}},\"id\":2}")
            PROGRESS=$(echo "$PROG" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['structuredContent'].get('progress',0))")
            echo "Progress: $PROGRESS%"
            if [ "$PROGRESS" = "100" ]; then
              FILE_URL=$(echo "$PROG" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['structuredContent']['file_url'])")
              echo "file_url=$FILE_URL" >> $GITHUB_OUTPUT
              break
            fi
          done

          if [ -z "$FILE_URL" ]; then
            echo "Export timed out"
            exit 1
          fi

      - name: Download and parse data
        run: |
          curl -sL -o data.xlsx "${{ steps.export.outputs.file_url }}"
          python3 << 'PYEOF'
          import openpyxl, json
          from datetime import datetime

          wb = openpyxl.load_workbook('data.xlsx', read_only=True)
          ws = wb.active

          data = []
          for row in ws.iter_rows(min_row=2, values_only=True):
              date, channel, subchannel, amount = row
              d = {
                  '日期': date.strftime('%Y-%m-%d') if isinstance(date, datetime) else str(date),
                  '渠道': str(channel).strip() if channel else '',
                  '细分渠道': str(subchannel).strip() if subchannel else '',
                  '销售额': float(amount) if amount else 0
              }
              data.append(d)
          wb.close()

          dates = sorted(set(d['日期'] for d in data))
          last_date = dates[-1]

          output = {
              'lastUpdate': last_date,
              'totalRows': len(data),
              'data': data
          }

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, separators=(',', ':'))

          print(f'Generated data.json: {len(data)} rows, {dates[0]} ~ {last_date}')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "📡 Auto-sync from Tencent Docs [skip ci]"
          git push
